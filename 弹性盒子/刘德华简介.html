<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘德华简介</title>
    <style>
        .wrapper{
            display: flex;
            width: 500px;
            height: 200px;
            background-color: rgb(155, 125, 96);
            border: 2px solid #000;
            overflow: hidden;
            resize:both;
        }
        .left{
            width: 150px;
            height: 100%;
            background-color: #fff;
        }
        .right{
            flex: 1 1 auto;
            margin-left: 20px;
            color: #fff;
        }
        .right p{
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="left"></div>
        <div class="right">
            <h3>刘德华</h3>
            <p>演员、歌手、香港“四大天王”之一</p>
            <p>1961年09月27日（65岁）</p>
        </div>
    </div>
</body>
</html>
