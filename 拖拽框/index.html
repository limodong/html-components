<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖拽框</title>
    <style>
        .container{
            display: flex;
            justify-content: space-around;
        }
        .source,.target{
            width: 300px;
            height: 200px;
            border: 1px solid #000;
        }

        ul{
            list-style: none;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        li{
            width: 300px;
            height: 50px;
            background-color: #abcdef;
            margin: 10px 0;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="source">
            <ul>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </div>
        <div class="target">
            <ul></ul>
        </div>
    </div>
    <script>
        var lis = document.querySelectorAll("li");
        var target = document.querySelector(".target ul");
        var source = document.querySelector(".source ul");
        var dom = null;
        lis.forEach(li => {
            li.setAttribute("draggable",true);
            li.ondragstart = (e) => {
                dom = e.target;
            }
        });
        target.ondragenter = (e) => {
            console.log("enter---",e);
        }
        // 可拖动的元素或者被选择的文本被拖进一个有效的放置目标时（每几百毫秒）触发
        target.ondragover = source.ondragover = (e) => {
            e.preventDefault(); // dragover事件会在drop之前触发，所以要阻止dragover的默认行为，否则不会触发drop事件
        }

        // 当可拖拽元素放下时会触发
        target.ondrop = source.ondrop = function(e){
            this.appendChild(dom);
        }
        
        
    </script>
</body>
</html>
