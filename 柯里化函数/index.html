<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柯里化</title>
</head>
<body>
    <script>
        // 示例子： (2 + 3) * 5     (2 + 6) * 2     (2 + 10) * 8 规律：第一个数字始终是固定的，后面的多个参数都是任意数字
        // 柯里化函数：固定某个函数的一些参数，得到该函数剩余参数的一个新函数，如果没有剩余参数，则调用
        function fn(x,y,z){
            return (x + y) * z;
        }

        /**
         * 柯里化函数
         */
        function curry(func){ // 函数是必须传的，函数后面的参数是一个固定的
            // 得到从下标1开始的参数
            var args = Array.prototype.slice.call(arguments,1); //获取固定不变的数字 2
            var that = this;
            return function(){
                var currArgs = Array.from(arguments); // 3,5
                var totalArgs = args.concat(currArgs);
                if (totalArgs.length >= func.length) { // 如果传进来的参数的长度 大于等于 fn函数传入参数的长度 就直接调用
                    return func.apply(null,totalArgs);
                }else{
                    totalArgs.unshift(func); // 因为curry的第一个参数一定是一个函数，所以需要把函数添加到数组的最前面
                    return that.curry.apply(that,totalArgs)
                }
                
            }
        }
        // 第一个参数是一个函数，第二个参数是固定的参数
        var handle = curry(fn,2);
        var g = handle(3);
       console.log(g(5))
    </script>
</body>
</html>
