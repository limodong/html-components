    <title>迭代器</title>

<body>
    <script>

        var arr = [1,2,3,4,5,6];
        // 模拟迭代器
        var iterator = {
            i: 0,
            next: function(){
                let value = arr[this.i];
                this.i++
                return {
                    value,
                    done: this.i >= arr.length
                }
            }
        }

        // 生成迭代器对象
        var createIterator = function(arr){
            let i = 0;
            return {
                next: () => ({
                    value: arr[i++],
                    done: i >= arr.length
                })
            }
        }
